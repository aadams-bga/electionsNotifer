services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: isbe
      POSTGRES_PASSWORD: isbe
      POSTGRES_DB: isbe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isbe"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    command: sh -c "alembic upgrade head && python -m isbe_notifier.seeds && uvicorn isbe_notifier.web.app:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg://isbe:isbe@db:5432/isbe
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  poller:
    build: .
    command: python -m isbe_notifier.poller
    environment:
      DATABASE_URL: postgresql+psycopg://isbe:isbe@db:5432/isbe
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
